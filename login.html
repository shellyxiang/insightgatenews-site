<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- Google Analytics -->
  <script>document.documentElement.style.visibility="hidden";</script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FJ9EZ1GEJB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FJ9EZ1GEJB');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>加入我们 · Insight Gate</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 导航 ── */
    .site-nav {
      background: #0a1628;
      border-bottom: 1px solid #1e3a5f;
      padding: 0.7rem 0;
      flex-shrink: 0;
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .brand { color: #d4af37; font-weight: 700; font-size: 1.1rem; text-decoration: none; margin-right: auto; }
    .nav-links { display: flex; list-style: none; gap: 0.2rem; }
    .nav-links a {
      color: #8b949e; text-decoration: none; font-size: 0.85rem;
      padding: 5px 10px; border-radius: 6px; transition: color 0.2s, background 0.2s;
    }
    .nav-links a:hover { color: #e6edf3; background: rgba(255,255,255,0.07); }
    .nav-join a {
      color: #e6edf3; text-decoration: none; font-size: 0.85rem;
      padding: 5px 14px; border: 1px solid #30363d; border-radius: 6px; transition: border-color 0.2s;
    }
    .nav-join a:hover { border-color: #8b949e; }
    .lang-btn {
      background: transparent; border: 1px solid #30363d; color: #8b949e;
      padding: 4px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
    }
    .lang-btn:hover { border-color: #8b949e; color: #e6edf3; }

    /* ── 主体 ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .auth-wrap { width: 100%; max-width: 400px; }

    .auth-header { margin-bottom: 32px; }
    .auth-header h1 { font-size: 1.4rem; font-weight: 600; color: #e6edf3; margin-bottom: 6px; }
    .auth-header p { font-size: 0.88rem; color: #8b949e; line-height: 1.5; }

    /* 标签切换 */
    .tabs {
      display: flex;
      border-bottom: 1px solid #21262d;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1; text-align: center; padding: 10px;
      font-size: 0.88rem; font-weight: 500; color: #8b949e;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s; margin-bottom: -1px;
    }
    .tab.active { color: #e6edf3; border-bottom-color: #d4af37; }

    /* 表单 */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 0.82rem; color: #8b949e; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 10px 14px;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; color: #e6edf3; font-size: 0.9rem;
      outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: #4da3ff; }

    .submit-btn {
      width: 100%; padding: 11px;
      background: #d4af37; color: #0d1117;
      border: none; border-radius: 8px;
      font-size: 0.92rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
      margin-top: 4px;
    }
    .submit-btn:hover { opacity: 0.88; }

    .divider {
      text-align: center; color: #4a5568;
      font-size: 0.78rem; margin: 20px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: 42%; height: 1px; background: #21262d;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .note { font-size: 0.78rem; color: #4a5568; text-align: center; margin-top: 20px; line-height: 1.6; }
    .note a { color: #8b949e; text-decoration: none; }
    .note a:hover { color: #e6edf3; }

    /* ── 页脚 ── */
    .site-footer {
      background: #0a1628; border-top: 1px solid #1e3a5f;
      padding: 1.2rem 0; text-align: center;
      color: #8b949e; font-size: 0.78rem; line-height: 1.6; flex-shrink: 0;
    }
    .site-footer a { color: #8b949e; text-decoration: none; margin: 0 0.4rem; }
    .site-footer a:hover { color: #e6edf3; }
    .sep { color: #30363d; }
    .disclaimer { max-width: 800px; margin: 0.5rem auto 0; font-size: 0.72rem; color: #4a5568; }
  </style>
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="brand">Insight Gate</a>
      <ul class="nav-links">
        <li><a href="index.html" id="nav-map">全球地图</a></li>
        <li><a href="contact.html" id="nav-about">关于我们</a></li>
      </ul>
      <div class="nav-join"><a href="login.html" id="nav-join">加入我们</a></div>
      <button class="lang-btn" id="langBtn">EN</button>
    </div>
  </nav>

  <main>
    <div class="auth-wrap">

      <div class="auth-header">
        <h1 id="auth-title">加入 Insight Gate</h1>
        <p id="auth-subtitle">成为社区的一部分，与我们一起探索经济与金融的世界。</p>
      </div>

      <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">
          <span id="tab-login-text">登录</span>
        </div>
        <div class="tab" id="tab-register" onclick="switchTab('register')">
          <span id="tab-register-text">注册</span>
        </div>
      </div>

      <!-- 登录 -->
      <div class="form-panel active" id="panel-login">
        <div class="field">
          <label id="label-email">邮箱</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label id="label-password">密码</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="submit-btn" id="btn-login">登录</button>
        <p class="note" style="margin-top:14px;">
          <a href="#" id="forgot-link">忘记密码？</a>
        </p>
      </div>

      <!-- 注册 -->
      <div class="form-panel" id="panel-register">
        <div class="field">
          <label id="label-reg-email">邮箱</label>
          <input type="email" id="reg-email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label id="label-reg-password">密码</label>
          <input type="password" id="reg-password" placeholder="••••••••" />
        </div>
        <div class="field">
          <label id="label-reg-confirm">确认密码</label>
          <input type="password" id="reg-confirm" placeholder="••••••••" />
        </div>
        <button class="submit-btn" id="btn-register">创建账号</button>
        <p class="note" id="reg-note">注册即表示同意我们的
          <a href="terms.html" id="link-terms">服务条款</a> 与
          <a href="privacy.html" id="link-privacy">隐私政策</a>。
        </p>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div>
      <a href="index.html" id="footer-map">全球地图</a><span class="sep">|</span>
      <a href="privacy.html" id="footer-privacy">隐私政策</a><span class="sep">|</span>
      <a href="terms.html" id="footer-terms">服务条款</a><span class="sep">|</span>
      <a href="contact.html" id="footer-contact">关于我们</a>
    </div>
    <div style="margin-top:0.4rem;">
      Email: support@insightgatenews.com &nbsp;·&nbsp; <span id="footer-copy">© Insight Gate. 保留所有权利.</span>
    </div>
    <div class="disclaimer">
      <strong id="disclaimer-label">免责声明：</strong><span id="disclaimer-text">Insight Gate 提供的所有内容仅用于教育与信息目的，不构成投资、交易或法律建议。我们不是持牌金融服务提供者。</span>
    </div>
  </footer>

  <script>
    const T = {
      zh: {
        navMap: "全球地图", navAbout: "关于我们", navJoin: "加入我们", langBtn: "EN",
        authTitle: "加入 Insight Gate",
        authSubtitle: "成为社区的一部分，与我们一起探索经济与金融的世界。",
        tabLogin: "登录", tabRegister: "注册",
        labelEmail: "邮箱", labelPassword: "密码",
        labelRegEmail: "邮箱", labelRegPassword: "密码", labelRegConfirm: "确认密码",
        btnLogin: "登录", btnRegister: "创建账号",
        forgotLink: "忘记密码？",
        regNote: '注册即表示同意我们的 <a href="terms.html" id="link-terms">服务条款</a> 与 <a href="privacy.html" id="link-privacy">隐私政策</a>。',
        footerMap: "全球地图", footerPrivacy: "隐私政策", footerTerms: "服务条款", footerContact: "关于我们",
        footerCopy: "© Insight Gate. 保留所有权利.",
        disclaimerLabel: "免责声明：",
        disclaimerText: "Insight Gate 提供的所有内容仅用于教育与信息目的，不构成投资、交易或法律建议。我们不是持牌金融服务提供者。"
      },
      en: {
        navMap: "World Map", navAbout: "About", navJoin: "Join Us", langBtn: "中文",
        authTitle: "Join Insight Gate",
        authSubtitle: "Become part of the community. Explore economics and finance with us.",
        tabLogin: "Log In", tabRegister: "Register",
        labelEmail: "Email", labelPassword: "Password",
        labelRegEmail: "Email", labelRegPassword: "Password", labelRegConfirm: "Confirm Password",
        btnLogin: "Log In", btnRegister: "Create Account",
        forgotLink: "Forgot password?",
        regNote: 'By registering you agree to our <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>.',
        footerMap: "World Map", footerPrivacy: "Privacy Policy", footerTerms: "Terms of Service", footerContact: "About",
        footerCopy: "© Insight Gate. All rights reserved.",
        disclaimerLabel: "Disclaimer: ",
        disclaimerText: "All content on Insight Gate is for informational and educational purposes only. It does not constitute financial, investment, or legal advice. We are not a licensed financial service provider."
      }
    };

    let lang = localStorage.getItem("lang") || "en";

    function applyLang() {
      const t = T[lang];
      document.getElementById("nav-map").textContent = t.navMap;
      document.getElementById("nav-about").textContent = t.navAbout;
      document.getElementById("nav-join").textContent = t.navJoin;
      document.getElementById("langBtn").textContent = t.langBtn;
      document.getElementById("auth-title").textContent = t.authTitle;
      document.getElementById("auth-subtitle").textContent = t.authSubtitle;
      document.getElementById("tab-login-text").textContent = t.tabLogin;
      document.getElementById("tab-register-text").textContent = t.tabRegister;
      document.getElementById("label-email").textContent = t.labelEmail;
      document.getElementById("label-password").textContent = t.labelPassword;
      document.getElementById("label-reg-email").textContent = t.labelRegEmail;
      document.getElementById("label-reg-password").textContent = t.labelRegPassword;
      document.getElementById("label-reg-confirm").textContent = t.labelRegConfirm;
      document.getElementById("btn-login").textContent = t.btnLogin;
      document.getElementById("btn-register").textContent = t.btnRegister;
      document.getElementById("forgot-link").textContent = t.forgotLink;
      document.getElementById("reg-note").innerHTML = t.regNote;
      document.getElementById("footer-map").textContent = t.footerMap;
      document.getElementById("footer-privacy").textContent = t.footerPrivacy;
      document.getElementById("footer-terms").textContent = t.footerTerms;
      document.getElementById("footer-contact").textContent = t.footerContact;
      document.getElementById("footer-copy").textContent = t.footerCopy;
      document.getElementById("disclaimer-label").textContent = t.disclaimerLabel;
      document.getElementById("disclaimer-text").textContent = t.disclaimerText;
    }

    function switchTab(tab) {
      document.getElementById("tab-login").classList.toggle("active", tab === "login");
      document.getElementById("tab-register").classList.toggle("active", tab === "register");
      document.getElementById("panel-login").classList.toggle("active", tab === "login");
      document.getElementById("panel-register").classList.toggle("active", tab === "register");
    }

    document.getElementById("langBtn").addEventListener("click", () => {
      lang = lang === "zh" ? "en" : "zh";
      localStorage.setItem("lang", lang);
      applyLang();
    });

    applyLang();
    document.documentElement.style.visibility = "";
  </script>

</body>
</html>
