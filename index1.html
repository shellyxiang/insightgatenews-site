<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>📊 A股与恒指（Yahoo via Worker）</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { --up:#0a7f31; --down:#c52222; --muted:#6b7280; }
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:24px;color:#222;background:#fafafa}
  h1{font-size:22px;margin:0 0 12px;font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:12px}
  .card{padding:16px;border-radius:14px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.08);position:relative}
  .name{font-weight:700;margin-bottom:8px}
  .val{font-size:28px;font-weight:800;letter-spacing:.3px}
  .chg{margin-top:4px;font-weight:600}
  .up{color:var(--up)} .down{color:var(--down)} .muted{color:var(--muted)}
  .badge{position:absolute;top:10px;right:12px;font-size:12px;padding:2px 8px;border-radius:999px;background:#eef2ff;color:#4338ca}
  .log{margin-top:18px;background:#f6f8fa;padding:12px;border-radius:10px;font:12px ui-monospace,Consolas,monospace;white-space:pre-wrap}
</style>
</head>
<body>
  <h1>📊 A股与恒生指数（Yahoo Finance via Worker）</h1>
  <div id="grid" class="grid"></div>
  <div id="log" class="log">日志：</div>

<script>
const PROXY = 'https://dawn-credit-62f9.xiangxuetingum.workers.dev'; // ← 你的 Worker
const INDICES = [
  { name: "上证指数",   symbol: "000001.SS" },
  { name: "深证成指",   symbol: "399001.SZ" },
  { name: "创业板指",   symbol: "399006.SZ" },
  { name: "恒生指数",   symbol: "^HSI" }
];

function log(...args){
  console.log(...args);
  document.getElementById("log").textContent += "\n" + args.join(" ");
}

async function fetchYahoo(symbol, range='1d', interval='1d'){
  const url = `${PROXY}/yahoo/chart?symbol=${encodeURIComponent(symbol)}&range=${encodeURIComponent(range)}&interval=${encodeURIComponent(interval)}`;
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`yahoo http ${res.status}`);
  const data = await res.json();
  const r = data?.chart?.result?.[0];
  if (!r) throw new Error('empty result');
  return r;
}

// —— 兜底工具：从数组里找最后一个有效数 —— //
function lastValid(arr){
  if (!Array.isArray(arr)) return null;
  for (let i=arr.length-1; i>=0; i--){
    const v = arr[i];
    if (v != null && isFinite(v)) return Number(v);
  }
  return null;
}

// —— 抽取"现价/前收"并做兜底 —— //
function getPriceAndPrev(r){
  const meta = r?.meta ?? {};
  const closes = r?.indicators?.quote?.[0]?.close ?? [];

  // 现价优先用 meta.regularMarketPrice；无则用最后一个有效 close
  const price = isFinite(meta.regularMarketPrice) ? Number(meta.regularMarketPrice)
               : lastValid(closes);

  // 前收优先用 meta.previousClose / chartPreviousClose；无则用倒数第2个 close
  const prevMeta = isFinite(meta.previousClose) ? Number(meta.previousClose)
                : (isFinite(meta.chartPreviousClose) ? Number(meta.chartPreviousClose) : null);

  const prev = (prevMeta != null) ? prevMeta
             : lastValid(closes.slice(0, -1));

  return { price, prev, meta };
}

function isClosed(meta) {
  // 用 regularMarketTime 判断：4 小时没更新视为"已闭市"
  const now = Date.now();
  const t = (meta?.regularMarketTime || 0) * 1000;
  return (now - t) > 4*3600*1000;
}

async function render(){
  const grid = document.getElementById('grid');
  grid.innerHTML = INDICES.map(()=>`
    <div class="card"><div class="name">加载中…</div><div class="val">—</div><div class="chg">—</div></div>
  `).join('');

  for (let i=0;i<INDICES.length;i++) {
    const item = INDICES[i];
    const div = grid.children[i];
    try{
      const r = await fetchYahoo(item.symbol);
      const { price, prev, meta } = getPriceAndPrev(r);

      if (!isFinite(price)) throw new Error('no price');

      const chg = (isFinite(prev) ? (price - prev) : NaN);
      const pct = (isFinite(prev) && prev !== 0) ? (chg/prev*100) : NaN;

      const closed = isClosed(meta);
      const trend = isFinite(chg) ? (chg >= 0 ? 'up' : 'down') : 'muted';
      const badge = closed ? '（已闭市）' : '实时';

      const chgStr = isFinite(chg) ? `${chg>=0?'+':''}${chg.toFixed(2)}` : '—';
      const pctStr = isFinite(pct) ? `${pct>=0?'+':''}${pct.toFixed(2)}%` : '—';

      div.innerHTML = `
        <div class="badge">${badge}</div>
        <div class="name">${item.name}</div>
        <div class="val">${price.toFixed(2)}</div>
        <div class="chg ${trend}">
          ${chgStr} (${pctStr})
        </div>
      `;
      log(item.name, price.toFixed(2), badge, 'prev=', isFinite(prev)?prev.toFixed(2):'—');
    }catch(e){
      log('error', item.name, e.message);
      div.innerHTML = `
        <div class="badge">—</div>
        <div class="name">${item.name}</div>
        <div class="val">—</div>
        <div class="chg muted">无法获取数据</div>`;
    }
  }
}

render();
</script>
</body>
</html>
