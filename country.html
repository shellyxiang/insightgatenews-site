<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FJ9EZ1GEJB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FJ9EZ1GEJB');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Country Article</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0b0f17;
      color: #e6edf3;
      line-height: 1.75;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .topbar {
      margin-bottom: 28px;
    }

    .back-link {
      color: #9fb0c0;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      color: #e6edf3;
    }

    .article-shell {
      background: #101827;
      border: 1px solid #223044;
      border-radius: 18px;
      padding: 32px;
    }

    #article {
      font-size: 16px;
    }

    #article h1,
    #article h2,
    #article h3 {
      color: #ffffff;
      line-height: 1.3;
      margin-top: 1.5em;
    }

    #article h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    #article h2 {
      font-size: 1.4rem;
      border-top: 1px solid #223044;
      padding-top: 18px;
    }

    #article p {
      color: #d6e0ea;
      margin: 1em 0;
    }

    #article img {
      max-width: 100%;
      border-radius: 12px;
      display: block;
      margin: 20px auto;
    }

    #article blockquote {
      border-left: 3px solid #3a567c;
      margin: 1.2em 0;
      padding-left: 16px;
      color: #b9c7d5;
    }

    #article code {
      background: #0c1320;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 0.95em;
    }

    .status {
      color: #9fb0c0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="back-link" id="backLink" href="index.html">← Back to map</a>
    </div>

    <div class="article-shell">
      <div id="article" class="status">Loading article...</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const iso = params.get("iso");
    const lang = localStorage.getItem("lang") || "en";

    if (iso) document.getElementById("backLink").href = "index.html?iso=" + iso;

    const articleEl = document.getElementById("article");

    if (!iso) {
      window.location.replace("index.html");
    } else {
      const filePath = `articles/${iso}.${lang}.md`;

      fetch(filePath)
        .then(res => {
          if (!res.ok) {
            throw new Error(`Article not found: ${filePath}`);
          }
          return res.text();
        })
        .then(md => {
          articleEl.innerHTML = marked.parse(md);
        })
        .catch(err => {
          articleEl.innerHTML = `
            <div class="status">
              Article not available yet.<br>
              <br>
              Requested file: <code>${filePath}</code>
            </div>
          `;
          console.error(err);
        });
    }
  </script>
</body>
</html>
