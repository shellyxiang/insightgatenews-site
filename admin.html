<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员面板 - Insight Gate</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    .admin-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
    .admin-header {
      text-align: center; margin-bottom: 24px;
      background: linear-gradient(135deg, #006400, #009900);
      color: white; padding: 22px; border-radius: 14px;
    }
    .panel { background: #fff; border-radius: 10px; padding: 22px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display:block; font-weight: 600; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
    .btn-admin {
      background: #006400; color: #fff; border: 0; padding: 10px 18px;
      border-radius: 6px; cursor:pointer; font-weight: 600;
    }
    .btn-admin:hover { background: #004d00; }
    .btn-ghost {
      background: #eee; color: #333; border: 0; padding: 10px 18px;
      border-radius: 6px; cursor:pointer; font-weight: 600;
      margin-left: 10px;
    }
    .btn-ghost:hover { background: #e2e2e2; }
    .hint { color:#666; font-size: 13px; }
    .result { margin-top: 12px; padding: 10px 12px; border-radius: 6px; background: #f6f6f6; }
    .result.ok { background: #e8f7ea; color: #0b6b1a; }
    .result.bad { background: #fdeaea; color: #8a1010; }
    code { background:#f2f2f2; padding:2px 6px; border-radius: 4px; }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo"><a href="index.html">Insight Gate</a></div>
      <div class="nav-menu">
        <a href="index.html" class="nav-link">首页</a>
        <a href="research-reports.html" class="nav-link">研究报告</a>
        <a href="login.html" class="nav-link">登录/注册</a>
        <span class="nav-link" id="admin-logout" style="color:#ff6b6b;cursor:pointer;">退出管理</span>
      </div>
    </div>
  </nav>

  <div class="admin-container">
    <div class="admin-header">
      <h1 id="admin-title">👑 管理员面板</h1>
      <p id="admin-subtitle">校验中...</p>
    </div>

    <div class="panel">
      <h2>📄 研报上传（管理员）</h2>
      <p class="hint">上传 PDF → 写入 Supabase Storage + reports 表（走 Node 服务）。</p>
      <p class="hint">接口：<code>POST https://www.insightgatenews.com/api/upload-report</code></p>

      <form id="report-upload-form">
        <div class="form-group">
          <label for="report-file">选择 PDF 文件</label>
          <input id="report-file" type="file" accept="application/pdf" required />
        </div>
        <button type="submit" class="btn-admin">上传研报</button>
        <button type="button" id="btn-check" class="btn-ghost">检查登录/权限</button>
      </form>

      <div id="upload-result" class="result" style="display:none;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Supabase 初始化
    const SUPABASE_URL = "https://vgaeukcmfzyspdctgzez.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnYWV1a2NtZnp5c3BkY3RnemV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUyNzQwNTAsImV4cCI6MjA4MDg1MDA1MH0.3QVnTGJwCBlZ7FolSXrIFYj7J5rK445N0Qrt-JkVlEA";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const API_BASE = "https://www.insightgatenews.com/api";

    async function checkAdminPermission() {
        const { data: { session } } = await sb.auth.getSession();
        if (!session?.user) {
        alert("⚠️ 请先登录");
        location.href = "login.html";
        return false;
        }

        const uid = session.user.id;
        const { data, error } = await sb.from("profiles").select("role").eq("id", uid).single();
        if (error) {
        console.error(error);
        alert("⚠️ 无法读取权限信息");
        location.href = "login.html";
        return false;
        }

        if (data?.role !== "admin") {
        alert("⚠️ 您没有管理员权限");
        location.href = "login.html";
        return false;
        }
        return true;
    }

    function setupAdminLogout() {
        document.getElementById("admin-logout")?.addEventListener("click", async () => {
        if (!confirm("确定要退出管理员模式吗？")) return;
        await sb.auth.signOut();
        location.href = "login.html";
        });
    }

    async function getTokenOrRedirect() {
        const { data: { session } } = await sb.auth.getSession();
        const token = session?.access_token;
        if (!token) {
        alert("未登录或登录已过期，请先登录");
        location.href = "login.html";
        return null;
        }
        return token;
    }

    function setupReportUpload() {
        document.getElementById("report-upload-form")?.addEventListener("submit", async (e) => {
        e.preventDefault();

        const fileInput = document.getElementById("report-file");
        const resultBox = document.getElementById("upload-result");
        resultBox.textContent = "";

        const file = fileInput?.files?.[0];
        if (!file) { resultBox.textContent = "请选择一个 PDF 文件"; return; }

        const token = await getTokenOrRedirect();
        if (!token) return;

        const formData = new FormData();
        formData.append("file", file);

        resultBox.textContent = "上传中...";

        const resp = await fetch(`${API_BASE}/api/upload-report`, {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` },
            body: formData,
        });

        const json = await resp.json().catch(() => ({}));
        if (!resp.ok) {
            resultBox.textContent = `上传失败：${json.error || json.message || resp.statusText}`;
            return;
        }

        resultBox.textContent = `上传成功：${json.report?.title || "OK"}（${json.report?.report_date || ""}）`;
        fileInput.value = "";
        });
    }

    document.addEventListener("DOMContentLoaded", async () => {
        // 先校验权限
        const ok = await checkAdminPermission();
        if (!ok) return;

        const statusEl = document.getElementById("admin-status");
        if (statusEl) {
        statusEl.textContent = "✅ 已通过管理员校验";
        }


        // 再初始化页面其它功能
        setupAdminLogout();
        setupReportUpload();

        // 你原来的函数如果还在同一页（非 module）里定义，就照旧调用
        if (typeof showAdminInfo === "function") showAdminInfo();
        if (typeof loadCurrentArticle === "function") loadCurrentArticle();
        if (typeof setupModalCloseEvents === "function") setupModalCloseEvents();
        if (typeof showContentPanel === "function") showContentPanel();
    });
   </script>


  
</body>
</html>
