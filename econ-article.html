<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FJ9EZ1GEJB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FJ9EZ1GEJB');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insight Gate</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0b0f17;
      color: #e6edf3;
      line-height: 1.75;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px;
    }
    .back-link {
      color: #9fb0c0; text-decoration: none; font-size: 14px;
    }
    .back-link:hover { color: #e6edf3; }
    .lang-btn {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 6px 14px; font-size: 13px; color: #9da7b3;
      cursor: pointer; font-family: inherit;
    }
    .lang-btn:hover { color: #e6edf3; border-color: #58a6ff; }
    .article-shell {
      background: #101827;
      border: 1px solid #223044;
      border-radius: 18px;
      padding: 32px;
    }
    #article { font-size: 16px; }
    #article h1, #article h2, #article h3 {
      color: #ffffff; line-height: 1.3; margin-top: 1.5em;
    }
    #article h1 { margin-top: 0; font-size: 2rem; }
    #article h2 { font-size: 1.4rem; border-top: 1px solid #223044; padding-top: 18px; }
    #article h3 { font-size: 1.15rem; }
    #article p  { color: #d6e0ea; margin: 1em 0; }
    #article ul, #article ol { color: #d6e0ea; padding-left: 20px; }
    #article li { margin-bottom: 4px; }
    #article blockquote {
      border-left: 3px solid #3a567c; margin: 1.2em 0;
      padding-left: 16px; color: #b9c7d5;
    }
    #article code {
      background: #0c1320; padding: 2px 6px;
      border-radius: 6px; font-size: 0.95em;
    }
    #article strong { color: #e6edf3; }
    .status { color: #9fb0c0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="back-link" href="econ-tree.html">← Back to tree</a>
      <button class="lang-btn" id="langBtn">中文</button>
    </div>
    <div class="article-shell">
      <div id="article" class="status">Loading...</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const key    = params.get("key");
    let   lang   = localStorage.getItem("lang") || "en";

    const langBtn   = document.getElementById("langBtn");
    const articleEl = document.getElementById("article");

    function loadArticle() {
      langBtn.textContent = lang === "zh" ? "EN" : "中文";
      if (!key) { window.location.replace("econ-tree.html"); return; }

      const url = `data/econ-tree-nodes/${key}.${lang}.full.md`;
      fetch(url)
        .then(r => r.ok ? r.text() : Promise.reject())
        .then(md => { articleEl.classList.remove("status"); articleEl.innerHTML = marked.parse(md); })
        .catch(() => {
          articleEl.classList.add("status");
          articleEl.innerHTML = `Content not available yet.<br><br>File: <code>${url}</code>`;
        });
    }

    langBtn.addEventListener("click", () => {
      lang = lang === "en" ? "zh" : "en";
      localStorage.setItem("lang", lang);
      loadArticle();
    });

    loadArticle();
  </script>
</body>
</html>
