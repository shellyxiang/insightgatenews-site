<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Economic & Financial System — Insight Gate</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0d1117;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #e6edf3;
      display: flex;
    }

    #tree-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Side Panel */
    #side-panel {
      width: 0;
      min-width: 0;
      background: #0d1117;
      border-left: 1px solid #30363d;
      overflow-y: auto;
      overflow-x: hidden;
      transition: width 0.3s ease, min-width 0.3s ease;
      position: relative;
      flex-shrink: 0;
    }
    #side-panel.open {
      width: var(--panel-w, 360px);
      min-width: var(--panel-w, 360px);
    }
    #resizer {
      width: 6px; flex-shrink: 0;
      cursor: col-resize;
      background: #30363d;
      transition: background 0.15s;
      display: none;
    }
    #resizer:hover, #resizer.dragging { background: #58a6ff; }
    #panel-inner {
      padding: 22px 20px 40px;
      min-width: 360px;
    }
    #panel-close {
      position: absolute; top: 14px; right: 14px;
      background: #21262d; border: 1px solid #30363d;
      border-radius: 8px; padding: 4px 10px;
      font-size: 13px; color: #9da7b3; cursor: pointer;
      font-family: inherit;
    }
    #panel-close:hover { color: #e6edf3; border-color: #58a6ff; }
    #panel-title {
      font-size: 17px; font-weight: 700; color: #e6edf3;
      margin-bottom: 4px; padding-right: 40px; line-height: 1.4;
    }
    #panel-subtitle {
      font-size: 12px; color: #6e7681; margin-bottom: 18px;
    }
    #panel-body { font-size: 13px; line-height: 1.8; color: #9da7b3; }
    #panel-body h1,#panel-body h2,#panel-body h3 {
      color: #e6edf3; margin: 18px 0 8px; font-size: 14px;
    }
    #panel-body p { margin-bottom: 12px; }
    #panel-body ul,#panel-body ol { padding-left: 18px; margin-bottom: 12px; }
    #panel-body li { margin-bottom: 4px; }
    #panel-body strong { color: #e6edf3; }
    #panel-body a { color: #58a6ff; }
    #panel-links {
      margin-top: 20px; padding-top: 16px;
      border-top: 1px solid #21262d;
    }
    #panel-links .pl-label {
      font-size: 10px; font-weight: 600; color: #58a6ff;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    #panel-links .pl-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    #panel-links .pl-tag {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 3px 10px;
      font-size: 12px; color: #8b949e;
    }
    #panel-empty {
      color: #484f58; font-style: italic; font-size: 13px;
      margin-top: 8px;
    }
    #panel-readmore {
      display: inline-block; margin-top: 18px;
      padding: 7px 16px; border-radius: 8px;
      background: #1e3a5f; border: 1px solid #58a6ff;
      color: #58a6ff; font-size: 13px; text-decoration: none;
    }
    #panel-readmore:hover { background: #58a6ff; color: #0d1117; }

    svg { display: block; width: 100%; height: 100%; cursor: grab; }
    svg:active { cursor: grabbing; }

    .link {
      fill: none;
      stroke-width: 2px;
      stroke-linecap: round;
    }

    .node-card { cursor: pointer; }
    .node-group:hover .node-card {
      filter: drop-shadow(0 0 14px rgba(88,166,255,0.55));
    }
    .node-label {
      font-size: 12px; font-weight: 600; fill: #fff;
      pointer-events: none;
      dominant-baseline: middle; text-anchor: middle;
    }
    .collapsed-ring {
      fill: none;
      stroke: rgba(255,255,255,0.55);
      stroke-width: 1.5;
      stroke-dasharray: 3 2;
    }

    /* Tooltip */
    #tooltip {
      position: absolute; width: 290px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 16px 18px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
      pointer-events: none;
      opacity: 0; transform: translateY(6px);
      transition: opacity 180ms, transform 180ms;
      z-index: 20;
    }
    #tooltip.show { opacity: 1; transform: translateY(0); }
    #tooltip .tt-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: #e6edf3; }
    #tooltip .tt-body  { font-size: 12px; line-height: 1.7; color: #9da7b3; }
    #tooltip .tt-section { margin-top: 8px; padding-top: 8px; border-top: 1px solid #21262d; }
    #tooltip .tt-label { display: block; font-size: 10px; font-weight: 600; color: #58a6ff; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
    #tooltip .tt-links-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
    #tooltip .tt-link-tag { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 2px 7px; font-size: 11px; color: #8b949e; }
    #tooltip .tt-placeholder { color: #484f58; font-style: italic; }

    /* Header */
    #header {
      position: absolute; top: 18px; left: 18px;
      background: rgba(22,27,34,0.92);
      border: 1px solid #30363d; border-radius: 14px;
      padding: 14px 18px; z-index: 10;
      backdrop-filter: blur(8px);
      max-width: 320px;
    }
    #header h1 { font-size: 14px; font-weight: 700; color: #e6edf3; line-height: 1.4; }
    #header p  { font-size: 11px; color: #6e7681; margin-top: 5px; }

    /* Top-right controls */
    #controls {
      position: absolute; top: 18px; right: 18px;
      display: flex; gap: 8px; z-index: 10;
    }
    .ctrl-btn {
      background: rgba(22,27,34,0.92);
      border: 1px solid #30363d; border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px; color: #9da7b3;
      text-decoration: none; cursor: pointer;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }
    .ctrl-btn:hover { color: #e6edf3; border-color: #58a6ff; }

    /* Hint */
    #hint {
      position: absolute; bottom: 18px; left: 18px;
      background: rgba(22,27,34,0.85);
      border: 1px solid #30363d; border-radius: 10px;
      padding: 8px 12px;
      font-size: 11px; color: #6e7681; z-index: 10;
    }

    /* Mobile */
    @media (max-width: 640px) {
      #side-panel.open {
        position: fixed; top: 0; left: 0;
        width: 100vw !important; min-width: 0 !important;
        height: 100%; z-index: 100;
        border-left: none;
      }
      #mobile-pill { display: none; }
      #resizer { display: none !important; }
      #panel-inner { min-width: 0; }
      #header { max-width: calc(100vw - 36px); padding: 10px 14px; }
      #header h1 { font-size: 12px; }
      #header p { display: none; }
      #controls { top: auto; bottom: 18px; right: 18px; }
      #hint { display: none; }
    }
  </style>
</head>

// ─── Colors by depth ─────────────────────────────────────────────────────────
const DEPTH_COLORS = [
  { fill: "#92400e", stroke: "#fbbf24" },
  { fill: "#1e3a8a", stroke: "#60a5fa" },
  { fill: "#064e3b", stroke: "#34d399" },
  { fill: "#4c1d95", stroke: "#a78bfa" },
  { fill: "#7f1d1d", stroke: "#f87171" },
];
function dc(depth) { return DEPTH_COLORS[Math.min(depth, DEPTH_COLORS.length - 1)]; }

// ─── Layout ──────────────────────────────────────────────────────────────────
const NODE_W = 118, NODE_H = 44, H_GAP = 170, V_GAP = 85;

const svg  = d3.select("#tree");
const g    = svg.append("g");

const zoom = d3.zoom()
  .scaleExtent([0.15, 3])
  .wheelDelta(e => -e.deltaY * (e.deltaMode === 1 ? 0.03 : e.deltaMode ? 0.8 : 0.001))
  .on("zoom", e => g.attr("transform", e.transform));
svg.call(zoom);

document.addEventListener("wheel", e => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });

const tooltip = document.getElementById("tooltip");
const ttTitle = document.getElementById("tt-title");
const ttBody  = document.getElementById("tt-body");

function esc(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function showTip(event, d) {
  const zh = lang === "zh";
  ttTitle.textContent = zh
    ? d.data.name + (d.data.name_en ? ` · ${d.data.name_en}` : "")
    : (d.data.name_en || d.data.name) + (d.data.name ? ` · ${d.data.name}` : "");

  const desc  = (zh ? d.data.desc  : d.data.desc_en)  || "";
  const why   = (zh ? d.data.why   : d.data.why_en)   || "";
  const links = d.data.linksTo || [];
  const note  = (zh ? d.data.note  : d.data.note_en)  || "";

  let html = "";
  if (desc)  html += `<p>${esc(desc)}</p>`;
  if (why)   html += `<p class="tt-section"><span class="tt-label">${zh ? "为何重要" : "Why it matters"}</span>${esc(why)}</p>`;
  if (links.length) {
    const tags = links.map(l => `<span class="tt-link-tag">${esc(l)}</span>`).join("");
    html += `<p class="tt-section"><span class="tt-label">${zh ? "关联节点" : "Related"}</span><span class="tt-links-list">${tags}</span></p>`;
  }
  if (note)  html += `<p class="tt-section">${esc(note)}</p>`;
  if (!html) html  = `<span class="tt-placeholder">${zh ? "内容待填写" : "Content coming soon"}</span>`;

  ttBody.innerHTML = html;
  let x = event.pageX + 14, y = event.pageY + 14;
  if (x + 306 > window.innerWidth)  x = event.pageX - 306 - 14;
  if (y + 160 > window.innerHeight) y = event.pageY - 160 - 14;
  tooltip.style.left = x + "px";
  tooltip.style.top  = y + "px";
  tooltip.classList.add("show");
}
function hideTip() { tooltip.classList.remove("show"); }
svg.on("click", e => { if (e.target.tagName === "svg") hideTip(); });

const treeLayout = d3.tree().nodeSize([V_GAP, H_GAP + NODE_W]);
let uid = 0, root;

function nodeLabel(data) {
  if (lang === "zh") return data.label || data.name;
  return data.label_en || data.name_en || data.name;
}

// Split label into ≤2 lines at the space nearest the midpoint
function splitLabel(label) {
  if (label.length <= 13) return [label];
  const mid = Math.floor(label.length / 2);
  let i = mid;
  while (i >= 0 && label[i] !== " ") i--;
  if (i < 1) {
    let j = mid;
    while (j < label.length && label[j] !== " ") j++;
    i = j;
  }
  if (i < 1 || i >= label.length) return [label];
  return [label.slice(0, i), label.slice(i + 1)];
}

function setNodeLabel(sel) {
  sel.each(function(d) {
    const el = d3.select(this);
    const lines = splitLabel(nodeLabel(d.data));
    el.text("");
    if (lines.length === 1) {
      el.append("tspan").attr("x", NODE_W / 2).attr("y", NODE_H / 2).text(lines[0]);
    } else {
      el.append("tspan").attr("x", NODE_W / 2).attr("y", NODE_H / 2 - 7).text(lines[0]);
      el.append("tspan").attr("x", NODE_W / 2).attr("dy", "1.25em").text(lines[1]);
    }
  });
}

function update(source) {
  treeLayout(root);
  const nodes = root.descendants();
  const links = root.links();

  // Links
  const link = g.selectAll("path.link").data(links, d => d.target.id);

  const linkEnter = link.enter().append("path")
    .attr("class", "link")
    .attr("stroke", d => dc(d.target.depth).stroke)
    .attr("stroke-opacity", 0.4)
    .attr("d", () => bezier(
      { x: source.x0, y: source.y0 + NODE_W / 2 },
      { x: source.x0, y: source.y0 + NODE_W / 2 }
    ));

  link.merge(linkEnter)
    .transition().duration(420)
    .attr("d", d => bezier(
      { x: d.source.x, y: d.source.y + NODE_W / 2 },
      { x: d.target.x, y: d.target.y - NODE_W / 2 }
    ));

  link.exit().transition().duration(420)
    .attr("d", () => bezier(
      { x: source.x, y: source.y + NODE_W / 2 },
      { x: source.x, y: source.y + NODE_W / 2 }
    )).remove();

  // Nodes
  const node = g.selectAll("g.node-group").data(nodes, d => d.id);

  const ne = node.enter().append("g")
    .attr("class", "node-group")
    .attr("transform", `translate(${source.y0 - NODE_W/2},${source.x0 - NODE_H/2})`)
    .style("opacity", 0)
    .on("click", (event, d) => {
      event.stopPropagation();
      const isLeaf = !d.children && !d._children;
      if (isLeaf) {
        openPanel(d);
      } else {
        if (d.children) {
          d._children = d.children; d.children = null;
        } else if (d._children) {
          d.children = d._children; d._children = null;
          d.children.forEach(child => {
            if (child.children) { child._children = child.children; child.children = null; }
          });
        }
        update(d);
      }
    })
    .on("dblclick", (event, d) => {
      event.stopPropagation();
      openPanel(d);
    });

  ne.append("rect")
    .attr("class", "node-card")
    .attr("width", NODE_W).attr("height", NODE_H)
    .attr("rx", 9).attr("ry", 9)
    .attr("fill",   d => dc(d.depth).fill)
    .attr("stroke", d => dc(d.depth).stroke)
    .attr("stroke-width", 1.5);

  ne.append("text")
    .attr("class", "node-label")
    .call(setNodeLabel);

  ne.append("circle")
    .attr("class", "collapsed-ring")
    .attr("cx", NODE_W).attr("cy", NODE_H / 2).attr("r", 5);

  const all = node.merge(ne);

  all.transition().duration(420)
    .attr("transform", d => `translate(${d.y - NODE_W/2},${d.x - NODE_H/2})`)
    .style("opacity", 1);

  // Long press to open panel (mobile branch nodes)
  let lpTimer = null;
  all.on("touchstart.lp", (event, d) => {
    lpTimer = setTimeout(() => { lpTimer = null; openPanel(d); }, 500);
  }, { passive: true })
  .on("touchend.lp touchmove.lp", () => { clearTimeout(lpTimer); lpTimer = null; });

  all.select(".node-label").call(setNodeLabel);
  all.select(".collapsed-ring").attr("display", d => d._children ? null : "none");
  all.select(".node-card")
    .attr("fill",   d => dc(d.depth).fill)
    .attr("stroke", d => dc(d.depth).stroke);

  node.exit().transition().duration(420)
    .attr("transform", `translate(${source.y - NODE_W/2},${source.x - NODE_H/2})`)
    .style("opacity", 0).remove();

  root.eachBefore(d => { d.x0 = d.x; d.y0 = d.y; });
}

function recenter() {
  const desc = root.descendants();
  const minY = d3.min(desc, d => d.y) - NODE_W / 2;
  const maxY = d3.max(desc, d => d.y) + NODE_W / 2;
  const minX = d3.min(desc, d => d.x) - NODE_H / 2;
  const maxX = d3.max(desc, d => d.x) + NODE_H / 2;
  const bw = maxY - minY, bh = maxX - minX;
  const sw = document.getElementById("tree-area").clientWidth, sh = window.innerHeight;
  const sc = Math.min(0.85, Math.min(sw / (bw + 100), sh / (bh + 100)));
  const tx = 48 - sc * minY;
  const ty = sh / 2 - sc * (minX + bh / 2);
  svg.transition().duration(500)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(sc));
}

document.getElementById("recenterBtn").addEventListener("click", recenter);

function bezier(s, t) {
  const mx = (s.y + t.y) / 2;
  return `M${s.y},${s.x} C${mx},${s.x} ${mx},${t.x} ${t.y},${t.x}`;
}

// ─── Side Panel ──────────────────────────────────────────────────────────────
const sidePanel   = document.getElementById("side-panel");
const panelTitle  = document.getElementById("panel-title");
const panelSub    = document.getElementById("panel-subtitle");
const panelBody   = document.getElementById("panel-body");
const panelLinks    = document.getElementById("panel-links");
const panelReadmore = document.getElementById("panel-readmore");

const resizer = document.getElementById("resizer");

function closePanel() {
  sidePanel.classList.remove("open");
  resizer.style.display = "none";
}
document.getElementById("panel-close").addEventListener("click", closePanel);
document.getElementById("mobile-pill").addEventListener("click", closePanel);

// Swipe down to close on mobile
(function () {
  let startY = 0;
  sidePanel.addEventListener("touchstart", e => { startY = e.touches[0].clientY; }, { passive: true });
  sidePanel.addEventListener("touchend", e => {
    if (e.changedTouches[0].clientY - startY > 80) closePanel();
  }, { passive: true });
})();

// Resizable panel
(function () {
  const MIN_W = 260, MAX_W = 700;
  let dragging = false;
  resizer.addEventListener("mousedown", e => {
    dragging = true;
    resizer.classList.add("dragging");
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
    e.preventDefault();
  });
  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    const w = Math.min(MAX_W, Math.max(MIN_W, window.innerWidth - e.clientX));
    document.body.style.setProperty("--panel-w", w + "px");
  });
  document.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove("dragging");
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
  });
})();

function renderPanel(d, mdText) {
  const zh = lang === "zh";
  const name    = zh ? d.data.name    : (d.data.name_en || d.data.name);
  const subname = zh ? d.data.name_en : d.data.name;
  const links   = d.data.linksTo || [];
  const note    = (zh ? d.data.note : d.data.note_en) || "";

  panelTitle.textContent = name;
  panelSub.textContent   = subname || "";

  panelBody.innerHTML = mdText
    ? marked.parse(mdText)
    : `<p id="panel-empty">${zh ? "内容待填写" : "Content coming soon"}</p>`;

  // clear any previous note paragraph
  const oldNote = panelLinks.querySelector(".pl-note");
  if (oldNote) oldNote.remove();

  if (links.length || note) {
    panelLinks.style.display = "";
    panelLinks.querySelector(".pl-label").textContent = zh ? "关联节点" : "Related";
    panelLinks.querySelector(".pl-tags").innerHTML =
      links.map(l => `<span class="pl-tag">${esc(l)}</span>`).join("");
    if (note) {
      const p = document.createElement("p");
      p.className = "pl-note";
      p.style.cssText = "font-size:12px;color:#6e7681;margin-top:8px";
      p.textContent = note;
      panelLinks.appendChild(p);
    }
  } else {
    panelLinks.style.display = "none";
  }

  // Read more button — only shown when hasArticle: true
  if (d.data.hasArticle) {
    panelReadmore.href = `econ-article.html?key=${d.data.key}`;
    panelReadmore.textContent = zh ? "阅读全文 →" : "Read more →";
    panelReadmore.style.display = "";
  } else {
    panelReadmore.style.display = "none";
  }

  sidePanel.classList.add("open");
  resizer.style.display = "block";
}

function openPanel(d) {
  const zh  = lang === "zh";
  const key = d.data.key;
  if (!key) { renderPanel(d, ""); return; }

  const url = `data/econ-tree-nodes/${key}.${zh ? "zh" : "en"}.md`;
  fetch(url)
    .then(r => r.ok ? r.text() : "")
    .catch(() => "")
    .then(md => renderPanel(d, md));
}

// ─── Init
root = d3.hierarchy(TREE_DATA);
root.descendants().forEach(d => {
  d.id = ++uid; d.x0 = 0; d.y0 = 0;
  if (d.depth >= 1 && d.children) { d._children = d.children; d.children = null; }
});
update(root);

setTimeout(() => {
  const desc = root.descendants();
  const minY = d3.min(desc, d => d.y) - NODE_W / 2;
  const maxY = d3.max(desc, d => d.y) + NODE_W / 2;
  const minX = d3.min(desc, d => d.x) - NODE_H / 2;
  const maxX = d3.max(desc, d => d.x) + NODE_H / 2;
  const bw = maxY - minY, bh = maxX - minX;
  const sw = document.getElementById("tree-area").clientWidth, sh = window.innerHeight;
  const sc = Math.min(0.85, Math.min(sw / (bw + 100), sh / (bh + 100)));
  const tx = 48 - sc * minY;
  const ty = sh / 2 - sc * (minX + bh / 2);
  svg.transition().duration(700)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(sc));
}, 60);

// Apply initial lang
applyLang();
